<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="https://kit.fontawesome.com/66aa7c98b3.js" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blossh</title>
</head>

<body>
    <div class="main-body">
        <div class="wholebody">
            <div class="header">
                <div class="navbar">
                    <div class="navbar-logo">
                        <a class="logo" href="#"><img src="logo.jpeg" alt="Blossh" style="height:50px; width: 50px; border-radius: 7px; margin: 10px;"></a>
                        <a class="brand-name" href="#"><img src="brand-name.jpeg" alt="Blossh" style="height:50px; width: 120px; border-radius: 7px; margin: 10px;"></a>
                    </div>
                </div>

                <div class="container" style="width: auto ;">
                    <div id="myCarousel" class="carousel slide" data-ride="carousel">
                        <!-- Indicators -->
                        <ol class="carousel-indicators">
                            <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                            <li data-target="#myCarousel" data-slide-to="1"></li>
                            <li data-target="#myCarousel" data-slide-to="2"></li>
                        </ol>

                        <!-- Wrapper for slides -->
                        <div class="carousel-inner">
                            <div class="item active">
                                <img src="collection-perfume.jpg" alt="Los Angeles" width="1000" height="300">
                            </div>

                            <div class="item">
                                <img src="collection-perfumeB.jpg" alt="Chicago" width="1000" height="300">
                            </div>

                            <div class="item">
                                <img src="collection-perfumeC.jpg" alt="New york" width="1000" height="300">
                            </div>
                        </div>

                        <!-- Left and right controls -->
                        <a class="left carousel-control" href="#myCarousel" data-slide="prev">
                            <span class="glyphicon glyphicon-chevron-left"></span>
                            <span class="sr-only">Previous</span>
                        </a>
                        <a class="right carousel-control" href="#myCarousel" data-slide="next">
                            <span class="glyphicon glyphicon-chevron-right"></span>
                            <span class="sr-only">Next</span>
                        </a>
                    </div>
                </div>

                <div class="product">
                    <div class="blosshWhiteProduct">
                        <div class="blossh-white">
                            <img src="blosshWhite.jpeg" style="width: auto; height: 300px; margin: 10px auto;">
                        </div>
                        <div class="buyButton" style="width: auto; margin: 10px auto;">
                            <form>
                                <script src="https://checkout.razorpay.com/v1/payment-button.js" data-payment_button_id="pl_I0jWihJAvjgWkE" async>
                                </script>
                            </form>
                        </div>
                    </div>
                </div>


            </div>
            <footer class="footer">
                <div class="icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <p class="company-name">
                        ABC &copy; 2021, ALL Rights Reserved
                    </p>
                </div>
            </footer>
        </div>
    </div>
</body>

</html>
